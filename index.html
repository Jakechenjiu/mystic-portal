<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>从心而书 · 神秘学殿堂</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600;700&family=EB+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&family=Noto+Serif+SC:wght@400;500;600;700&display=swap" rel="stylesheet" media="print" onload="this.media='all'">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{--gold:#b8962e;--gold-b:#d4af37;--gold-d:#8a6f20;--ember:#e8a33c;--bone:#e8e0d0;--tg:#c8a84e;--td:#807868;--tgh:#504840;--blood:#6b1c1c;--ease:cubic-bezier(.16,1,.3,1);--font-t:'Cinzel','Noto Serif SC',Georgia,serif;--font-b:'EB Garamond','Noto Serif SC',Georgia,serif}
html,body{margin:0;padding:0;overflow:hidden;width:100%;height:100%;background:#000;font-family:var(--font-b)}
canvas{display:block;width:100%;height:100%}

/* UI Layer */
#ui{position:fixed;inset:0;z-index:10;pointer-events:none;display:flex;flex-direction:column;align-items:center;justify-content:flex-end;padding-bottom:80px}
#ui>*{pointer-events:auto}

/* Age Gate */
.age{position:fixed;inset:0;z-index:900;display:grid;place-items:center;background:rgba(0,0,0,.92);transition:opacity .8s}
.age.out{opacity:0;pointer-events:none}
.age-box{text-align:center;max-width:340px;padding:40px 24px}
.age-box h2{font-family:var(--font-t);font-size:1.1rem;color:var(--tg);font-weight:500;letter-spacing:.08em;margin-bottom:14px;text-shadow:0 0 20px rgba(184,150,46,.15)}
.age-box p{font-size:.78rem;color:var(--td);line-height:1.9;margin-bottom:28px}
.age-btns{display:flex;gap:12px;justify-content:center}

/* Splash */
.splash{position:fixed;inset:0;z-index:800;display:grid;place-items:center;background:rgba(0,0,0,.85);transition:opacity 1s var(--ease),visibility 1s}
.splash.gone{opacity:0;visibility:hidden;pointer-events:none}
.si{text-align:center;max-width:400px;padding:20px}
.rune{width:140px;height:140px;margin:0 auto 32px}
.rune svg{width:100%;height:100%}
.rc{stroke-dasharray:503;stroke-dashoffset:503;animation:draw 1.8s var(--ease) forwards}
.rc2{animation-delay:.15s}.rc3{animation-delay:.3s}
.rh{stroke-dasharray:600;stroke-dashoffset:600;animation:draw 1.2s var(--ease) .4s forwards}
.rsym{animation:glow 1.2s ease-in-out .8s forwards}
@keyframes draw{to{stroke-dashoffset:0}}
@keyframes glow{0%{opacity:0}50%{opacity:1}to{opacity:.85}}
.sl{font-family:var(--font-t);font-size:1rem;color:var(--tg);line-height:2.6;opacity:0;letter-spacing:.06em;transform:translateY(14px);transition:opacity .9s var(--ease),transform .9s var(--ease);text-shadow:0 0 15px rgba(184,150,46,.1)}
.sl.show{opacity:1;transform:translateY(0)}

/* Doors */
.doors{position:fixed;inset:0;z-index:850;display:flex;pointer-events:none}
.door{width:50%;height:100%;background:#050308;display:grid;place-items:center;transition:transform 1.8s var(--ease);position:relative}
.door::before{content:'';position:absolute;inset:0;background:linear-gradient(180deg,transparent,rgba(184,150,46,.015),transparent)}
.door-l{transform-origin:left}.door-r{transform-origin:right}
.door-l.open{transform:translateX(-100%)}.door-r.open{transform:translateX(100%)}
.door-s{font-size:2.2rem;color:var(--gold-d);opacity:.2}

/* Buttons */
.btn{padding:12px 28px;background:rgba(0,0,0,.4);border:1px solid var(--gold);color:var(--tg);font-family:var(--font-t);font-size:.82rem;letter-spacing:.14em;transition:all .4s var(--ease);position:relative;overflow:hidden;backdrop-filter:blur(8px)}
.btn::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at 50% 50%,rgba(184,150,46,.1),transparent 70%);opacity:0;transition:opacity .4s}
.btn:hover{border-color:var(--gold-b);color:var(--bone);box-shadow:0 0 40px rgba(184,150,46,.2),0 0 80px rgba(184,150,46,.05)}
.btn:hover::before{opacity:1}
.btn:active{transform:scale(.97)}
.btn2{border-color:var(--gold-d);color:var(--td);font-size:.75rem}
.btn-sm{padding:8px 18px;font-size:.72rem}

/* Nav */
.nav{position:fixed;bottom:0;left:0;right:0;z-index:50;display:flex;align-items:center;justify-content:center;padding:10px 16px;background:linear-gradient(to top,rgba(0,0,0,.7),transparent);backdrop-filter:blur(4px)}
.nav-l{display:flex;gap:16px;overflow-x:auto}
.nl{font-family:var(--font-t);font-size:.52rem;color:var(--td);letter-spacing:.12em;text-transform:uppercase;transition:all .3s;position:relative;padding-bottom:4px;white-space:nowrap;text-shadow:0 1px 3px rgba(0,0,0,.5)}
.nl:hover,.nl.on{color:var(--tg)}
.nl.on::after{content:'';position:absolute;bottom:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--gold),transparent)}

/* Parchment overlay */
.parchment{position:fixed;z-index:20;pointer-events:none;transition:all 1.2s var(--ease);opacity:0}
.parchment.show{opacity:1;pointer-events:auto}
.parchment-inner{
  width:100%;height:100%;padding:30px 24px;
  background:radial-gradient(ellipse at 50% 30%,rgba(30,25,18,.95),rgba(20,16,10,.98));
  border:1px solid rgba(184,150,46,.12);
  overflow-y:auto;
  scrollbar-width:thin;scrollbar-color:var(--gold-d) transparent;
}
.parchment-inner::-webkit-scrollbar{width:4px}
.parchment-inner::-webkit-scrollbar-thumb{background:var(--gold-d);border-radius:2px}

/* Home menu on parchment */
.menu-title{font-family:var(--font-t);font-size:1.1rem;color:var(--tg);text-align:center;margin-bottom:6px;letter-spacing:.12em;text-shadow:0 0 15px rgba(184,150,46,.1)}
.menu-sub{font-size:.72rem;color:var(--td);text-align:center;font-style:italic;margin-bottom:20px}
.menu-divider{text-align:center;font-size:.4rem;color:var(--gold-d);letter-spacing:1em;margin:16px 0;opacity:.4}
.menu-item{display:flex;align-items:center;gap:14px;padding:14px 12px;border-bottom:1px solid rgba(184,150,46,.06);cursor:pointer;transition:all .3s}
.menu-item:hover{background:rgba(184,150,46,.04)}
.menu-item:last-child{border-bottom:none}
.mi-sym{font-size:1.2rem;width:36px;text-align:center;color:var(--gold-d);flex-shrink:0}
.mi-text{flex:1}
.mi-name{font-family:var(--font-t);font-size:.78rem;color:var(--tg);letter-spacing:.08em;margin-bottom:2px}
.mi-desc{font-size:.62rem;color:var(--td);font-style:italic}
.mi-arrow{font-size:.6rem;color:var(--tgh)}

/* Section headers */
.sec-h{font-family:var(--font-t);font-size:.95rem;color:var(--tg);text-align:center;margin-bottom:4px;letter-spacing:.1em;text-shadow:0 0 12px rgba(184,150,46,.08)}
.sec-h::after{content:'✦';display:block;margin-top:6px;font-size:.4rem;color:var(--gold-d);letter-spacing:.5em;opacity:.35}
.sec-sub{font-size:.72rem;color:var(--td);text-align:center;font-style:italic;margin-bottom:20px;line-height:1.8}

/* Back button */
.back{display:inline-flex;align-items:center;gap:6px;font-family:var(--font-t);font-size:.62rem;color:var(--td);letter-spacing:.1em;text-transform:uppercase;cursor:pointer;margin-bottom:16px;transition:color .3s}
.back:hover{color:var(--tg)}

/* Form */
.fg{margin-bottom:14px}
.fg label{display:block;font-family:var(--font-t);font-size:.65rem;color:var(--td);letter-spacing:.1em;margin-bottom:5px}
.fg input,.fg select,.fg textarea{width:100%;font-family:var(--font-b);font-size:.82rem;color:var(--bone);background:rgba(0,0,0,.3);border:1px solid rgba(184,150,46,.1);padding:10px 12px;border-radius:4px;outline:none;transition:border-color .3s}
.fg input:focus,.fg select:focus,.fg textarea:focus{border-color:var(--gold)}
.fg textarea{resize:vertical;min-height:70px}

/* Tarot */
.spread-type{display:flex;gap:8px;justify-content:center;margin-bottom:16px}
.sp-opt{padding:6px 14px;border:1px solid rgba(184,150,46,.1);border-radius:4px;background:transparent;color:var(--td);font-family:var(--font-t);font-size:.65rem;letter-spacing:.1em;cursor:pointer;transition:all .3s}
.sp-opt:hover,.sp-opt.on{border-color:var(--gold);color:var(--tg);background:rgba(184,150,46,.05)}
.ccd{display:flex;gap:36px;justify-content:center;align-items:flex-end;margin:20px 0}
.cc{display:flex;flex-direction:column;align-items:center;opacity:.15;transition:opacity .9s var(--ease)}
.cc.lit{opacity:1}
.cc-f{width:8px;height:14px;background:radial-gradient(ellipse at 50% 100%,var(--ember),rgba(232,163,60,.3) 65%,transparent);border-radius:50% 50% 50% 50%/65% 65% 35% 35%;opacity:0;transition:opacity .6s;animation:fl 2s ease-in-out infinite alternate}
.cc.lit .cc-f{opacity:1}
.cc-b{width:10px;height:34px;background:linear-gradient(to bottom,#e8dcc8,#c8b8a0);border-radius:2px;margin-top:-1px}
@keyframes fl{0%{opacity:.85}50%{opacity:1}100%{opacity:.9}}

.card-row{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;margin:16px 0}
.card{width:64px;height:96px;position:relative;cursor:pointer;transform-style:preserve-3d;transition:transform .8s var(--ease)}
.card:hover{transform:translateY(-8px) rotateX(4deg)}
.card.flipped{transform:rotateY(180deg)}
.card.sel{transform:translateY(-14px) scale(1.06);z-index:10}
.card-f{position:absolute;inset:0;backface-visibility:visible;border:1px solid var(--gold-d);border-radius:4px;display:grid;place-items:center;background:linear-gradient(145deg,rgba(21,16,40,.9),rgba(26,39,68,.9));color:var(--gold-d);font-size:.9rem;box-shadow:0 2px 8px rgba(0,0,0,.4)}
.card-f::before{content:'';position:absolute;inset:3px;border:1px solid rgba(184,150,46,.08);border-radius:2px}
.card.flipped .card-f{opacity:0}
.card-b{position:absolute;inset:0;backface-visibility:hidden;transform:rotateY(180deg);border:1px solid var(--gold);border-radius:4px;background:radial-gradient(ellipse at 50% 30%,rgba(184,150,46,.05),transparent 60%),rgba(21,16,40,.95);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;padding:4px;font-size:.4rem;color:var(--tg);box-shadow:0 0 15px rgba(184,150,46,.08)}
.card-b .rev{color:var(--blood);font-size:.35rem;transform:rotate(180deg)}

.results{display:flex;flex-direction:column;gap:20px;align-items:center}
.res-card{text-align:center}
.res-card .sym{font-size:1.8rem;color:var(--gold);text-shadow:0 0 15px rgba(184,150,46,.2)}
.res-card .name{font-family:var(--font-t);font-size:.68rem;color:var(--tg);letter-spacing:.08em;margin-top:3px}
.res-card .orient{font-size:.45rem;color:var(--blood);margin-top:2px}
.res-txt{max-width:340px;text-align:center;margin:0 auto}
.res-txt p{font-size:.85rem;color:var(--tg);line-height:2;margin-bottom:8px}
.rl{font-size:.5rem;color:var(--tgh);text-align:center;line-height:1.7;margin:12px 0}
.ink{display:inline;opacity:0;filter:blur(3px);animation:ib .5s var(--ease) forwards}
@keyframes ib{0%{opacity:0;filter:blur(3px)}50%{opacity:.6;filter:blur(1.5px)}100%{opacity:1;filter:blur(0)}}

/* Star Chart */
.planet{margin-bottom:14px;padding:14px;border:1px solid rgba(184,150,46,.08);border-radius:6px;background:rgba(0,0,0,.2)}
.planet-name{font-family:var(--font-t);font-size:.62rem;color:var(--gold);letter-spacing:.12em;text-transform:uppercase;margin-bottom:4px}
.planet-sign{font-size:.9rem;color:var(--tg);margin-bottom:3px}
.planet-desc{font-size:.72rem;color:var(--td);line-height:1.7}

/* Name */
.el-tag{display:inline-block;padding:6px 14px;margin:3px;border:1px solid rgba(184,150,46,.1);border-radius:4px;font-size:.78rem;color:var(--tg)}
.el-desc{font-size:.78rem;color:var(--td);line-height:1.9;margin-top:14px;text-align:center}

/* I Ching */
.hex-disp{font-size:2.5rem;text-align:center;margin:16px 0;color:var(--gold);letter-spacing:6px;text-shadow:0 0 15px rgba(184,150,46,.15)}
.hex-name{font-family:var(--font-t);font-size:1rem;color:var(--tg);text-align:center;margin-bottom:6px}
.hex-judge{font-size:.82rem;color:var(--td);line-height:2;text-align:center;max-width:340px;margin:0 auto}
.coin-row{display:flex;gap:14px;justify-content:center;margin:14px 0}
.coin{width:42px;height:42px;border:1.5px solid var(--gold-d);border-radius:50%;display:grid;place-items:center;font-size:.9rem;color:var(--tg);background:rgba(0,0,0,.3);transition:all .4s}
.coin.thrown{animation:coinFlip .6s var(--ease)}
@keyframes coinFlip{0%{transform:rotateX(0)}50%{transform:rotateX(90deg)}100%{transform:rotateX(0)}}

/* Dream */
.dream-entry{padding:14px;border:1px solid rgba(184,150,46,.05);border-radius:6px;background:rgba(0,0,0,.15);margin-bottom:10px}
.dream-date{font-size:.55rem;color:var(--tgh);margin-bottom:3px}
.dream-text{font-size:.78rem;color:var(--bone);line-height:1.8;margin-bottom:6px}
.dream-symbols{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:6px}
.dream-tag{padding:2px 8px;border:1px solid rgba(184,150,46,.1);border-radius:10px;font-size:.55rem;color:var(--tg)}
.dream-interp{font-size:.7rem;color:var(--td);line-height:1.7;font-style:italic}

/* Encyclopedia */
.enc-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(110px,1fr));gap:8px}
.enc-item{padding:12px 8px;border:1px solid rgba(184,150,46,.05);border-radius:6px;background:rgba(0,0,0,.15);text-align:center;cursor:pointer;transition:all .3s}
.enc-item:hover{border-color:rgba(184,150,46,.15);background:rgba(184,150,46,.03)}
.enc-s{font-size:1.3rem;margin-bottom:3px}
.enc-n{font-family:var(--font-t);font-size:.58rem;color:var(--tg);letter-spacing:.06em}
.enc-det{margin-top:16px;padding:16px;border:1px solid rgba(184,150,46,.08);border-radius:6px;background:rgba(0,0,0,.2)}
.enc-det h3{font-family:var(--font-t);font-size:.85rem;color:var(--tg);font-weight:500;margin-bottom:8px;letter-spacing:.06em}
.enc-det p{font-size:.72rem;color:var(--td);line-height:1.9}

/* Records */
.rec{padding:12px;border:1px solid rgba(184,150,46,.05);border-radius:6px;background:rgba(0,0,0,.12);margin-bottom:8px;cursor:pointer;transition:all .3s}
.rec:hover{border-color:rgba(184,150,46,.12)}
.rec-h{display:flex;justify-content:space-between;align-items:center;margin-bottom:3px}
.rec-t{font-family:var(--font-t);font-size:.58rem;color:var(--gold);letter-spacing:.08em;text-transform:uppercase}
.rec-d{font-size:.48rem;color:var(--tgh)}
.rec-n{font-size:.8rem;color:var(--tg);margin-bottom:2px}
.rec-p{font-size:.68rem;color:var(--td);line-height:1.6;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.rec-x{margin-top:5px;font-size:.48rem;color:var(--tgh);background:none;border:none;font-family:inherit;text-decoration:underline;text-underline-offset:2px;cursor:pointer}
.re-empty{text-align:center;padding:30px 12px}
.re-empty p{font-size:.75rem;color:var(--td);line-height:2.2;font-style:italic}

/* Settings */
.set{position:fixed;inset:0;z-index:200}
.set-o{position:absolute;inset:0;background:rgba(0,0,0,.6)}
.set-d{position:absolute;bottom:0;left:0;right:0;background:rgba(15,12,8,.95);border-top:1px solid rgba(184,150,46,.1);border-radius:12px 12px 0 0;padding:20px;transform:translateY(100%);transition:transform .5s var(--ease);backdrop-filter:blur(10px)}
.set.vis .set-d{transform:translateY(0)}
.set-h{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px}
.set-h h3{font-family:var(--font-t);font-size:.72rem;color:var(--tg);font-weight:500;letter-spacing:.12em}
.set-x{background:none;border:none;color:var(--td);font-size:1rem}
.set-i{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid rgba(184,150,46,.03)}
.set-i label{font-size:.75rem;color:var(--bone)}
.set-l{margin-top:14px;padding-top:12px;border-top:1px solid rgba(184,150,46,.03)}
.set-l p{font-size:.55rem;color:var(--tgh);line-height:1.7;margin-bottom:8px}
.set-b{background:none;border:none;color:var(--gold-d);font-size:.65rem;font-family:inherit;text-decoration:underline;text-underline-offset:3px;cursor:pointer}

/* Candle glow effect */
.candle-glow{position:fixed;pointer-events:none;z-index:5;transition:opacity 1s}

/* Loading */
.loading{position:fixed;inset:0;z-index:1000;display:grid;place-items:center;background:#000;color:var(--tg);font-family:var(--font-t);font-size:.8rem;letter-spacing:.12em}

@media(max-width:480px){
  .parchment-inner{padding:20px 16px}
  .menu-item{padding:12px 10px;gap:10px}
  .mi-sym{font-size:1rem;width:28px}
  .card{width:52px;height:78px}
  .ccd{gap:24px}
  .enc-grid{grid-template-columns:repeat(auto-fill,minmax(90px,1fr))}
  .nav-l{gap:10px}
  .nl{font-size:.48rem}
}
</style>
</head>
<body>

<div class="loading" id="loading">✦ 帷幕正在升起 ✦</div>

<div class="age" id="age"><div class="age-box"><h2>你已年满18岁吗？</h2><p>你还年轻，星辰为你保留了最多的可能性。<br>这些解读可以参考，但不要让它替你做决定。</p><div class="age-btns"><button class="btn" id="ayes">我已成年</button><button class="btn btn2" id="ano">我还未成年</button></div></div></div>

<div class="splash" id="splash"><div class="si"><div class="rune"><svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg"><defs><filter id="gw"><feGaussianBlur stdDeviation="2.5" result="b"/><feComposite in="SourceGraphic" in2="b" operator="over"/></filter><linearGradient id="rg" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#b8962e" stop-opacity="0"/><stop offset="50%" stop-color="#e8a33c" stop-opacity="1"/><stop offset="100%" stop-color="#b8962e" stop-opacity="0"/></linearGradient></defs><circle cx="100" cy="100" r="80" fill="none" stroke="url(#rg)" stroke-width=".5" class="rc"/><circle cx="100" cy="100" r="60" fill="none" stroke="url(#rg)" stroke-width=".5" class="rc rc2"/><circle cx="100" cy="100" r="40" fill="none" stroke="url(#rg)" stroke-width=".5" class="rc rc3"/><polygon points="100,20 140,80 180,140 100,180 20,140 60,80" fill="none" stroke="url(#rg)" stroke-width=".8" class="rh" filter="url(#gw)"/><text x="100" y="108" text-anchor="middle" class="rsym" fill="#e8a33c" font-size="28" opacity="0">☿</text></svg></div><div class="s-lines"><p class="sl">你找到了这扇门。</p><p class="sl">这不是巧合。</p><p class="sl">在你出生的那一刻，</p><p class="sl">星辰就已经写好了这个时刻。</p></div><button class="btn" id="enter" style="opacity:0;transform:translateY(14px);transition:opacity .9s var(--ease),transform .9s var(--ease)">我准备好了</button></div></div>

<div class="doors" id="doors"><div class="door door-l" id="dl"><span class="door-s">☽</span></div><div class="door door-r" id="dr"><span class="door-s">☾</span></div></div>

<!-- Parchment overlay -->
<div class="parchment" id="parchment">
<div class="parchment-inner" id="parch-inner"></div>
</div>

<!-- Nav -->
<nav class="nav" id="nav" style="display:none">
<div class="nav-l">
<a href="#" class="nl on" data-p="menu">密室</a>
<a href="#" class="nl" data-p="tarot">塔罗</a>
<a href="#" class="nl" data-p="star">星盘</a>
<a href="#" class="nl" data-p="name">姓名</a>
<a href="#" class="nl" data-p="iching">易经</a>
<a href="#" class="nl" data-p="daily">启示</a>
<a href="#" class="nl" data-p="dream">梦境</a>
<a href="#" class="nl" data-p="ency">图鉴</a>
<a href="#" class="nl" data-p="records">壁龛</a>
</div>
<button class="btn btn-sm" id="cog" style="position:absolute;right:12px;top:50%;transform:translateY(-50%);padding:4px 8px;font-size:.7rem">⚙</button>
</nav>

<div class="set hidden" id="set"><div class="set-o" id="seto"></div><div class="set-d"><div class="set-h"><h3>烛台底部的暗格</h3><button class="set-x" id="setx">✕</button></div><div class="set-i"><label>粒子效果</label><input type="checkbox" id="ptog" checked></div><div class="set-l"><p>数据隐私：你的信息仅用于本小程序内的解读，不共享给第三方。</p><button class="set-b" id="clr">清除所有个人数据</button></div></div></div>

<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>
