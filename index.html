<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>从心而书 · 神秘学殿堂</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600;700&family=EB+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&family=Noto+Serif+SC:wght@400;500;600;700&display=swap" rel="stylesheet" media="print" onload="this.media='all'">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
  --deep:#060310;--nebula:#1a0828;--cosmic:#0d1b3e;
  --gold:#d4af37;--gold-d:#8a6f20;--gold-b:#f0d060;
  --stardust:#a8a0b8;--supernova:#ff8c42;--teal:#00c8aa;--blood:#8b1a1a;
  --bone:#e8e0d0;--tg:#d4af37;--td:#9890a8;--tgh:#605878;
  --ease:cubic-bezier(.16,1,.3,1);
  --font-t:'Cinzel','Noto Serif SC',Georgia,serif;
  --font-b:'EB Garamond','Noto Serif SC',Georgia,serif;
}
html,body{margin:0;padding:0;overflow:hidden;width:100%;height:100%;background:var(--deep);font-family:var(--font-b)}
canvas{display:block;position:fixed;inset:0;z-index:0}
::selection{background:rgba(212,175,55,.25)}

/* Loading */
.loading{position:fixed;inset:0;z-index:2000;display:grid;place-items:center;background:rgba(6,3,16,.98)}
.loading-text{font-family:var(--font-t);color:var(--gold);font-size:.7rem;letter-spacing:.2em;opacity:0;animation:ld 2s ease-in-out infinite}
@keyframes ld{0%,100%{opacity:.2}50%{opacity:.8}}

/* Age Gate */
.age{position:fixed;inset:0;z-index:900;display:grid;place-items:center;background:rgba(6,3,16,.95);transition:opacity .8s}
.age.out{opacity:0;pointer-events:none}
.age-box{text-align:center;max-width:320px;padding:40px 20px}
.age-box h2{font-family:var(--font-t);font-size:1rem;color:var(--gold);font-weight:500;letter-spacing:.1em;margin-bottom:14px;text-shadow:0 0 30px rgba(212,175,55,.15)}
.age-box p{font-size:.72rem;color:var(--td);line-height:2;margin-bottom:28px}
.age-btns{display:flex;gap:12px;justify-content:center}

/* Splash */
.splash{position:fixed;inset:0;z-index:800;display:grid;place-items:center;background:transparent;transition:opacity 1.5s var(--ease),visibility 1.5s}
.splash.gone{opacity:0;visibility:hidden;pointer-events:none}
.si{text-align:center;max-width:380px;padding:20px}
.rune{width:130px;height:130px;margin:0 auto 30px}
.rune svg{width:100%;height:100%}
.rc{stroke-dasharray:503;stroke-dashoffset:503;animation:draw 2s var(--ease) forwards}
.rc2{animation-delay:.2s}.rc3{animation-delay:.4s}
.rh{stroke-dasharray:600;stroke-dashoffset:600;animation:draw 1.4s var(--ease) .5s forwards}
.rsym{animation:glow 1.5s ease-in-out 1s forwards}
@keyframes draw{to{stroke-dashoffset:0}}
@keyframes glow{0%{opacity:0}50%{opacity:1}to{opacity:.8}}
.sl{font-family:var(--font-t);font-size:.92rem;color:var(--gold);line-height:2.8;opacity:0;letter-spacing:.08em;transform:translateY(14px);transition:opacity 1s var(--ease),transform 1s var(--ease);text-shadow:0 0 20px rgba(212,175,55,.1)}
.sl.show{opacity:1;transform:translateY(0)}

/* Doors */
.doors{position:fixed;inset:0;z-index:850;display:flex;pointer-events:none}
.door{width:50%;height:100%;background:var(--deep);display:grid;place-items:center;transition:transform 2s var(--ease);position:relative}
.door::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at 50% 50%,rgba(212,175,55,.02),transparent 70%)}
.door-l{transform-origin:left}.door-r{transform-origin:right}
.door-l.open{transform:translateX(-100%)}.door-r.open{transform:translateX(100%)}
.door-s{font-size:2rem;color:var(--gold-d);opacity:.15}

/* Buttons */
.btn{padding:11px 26px;background:rgba(6,3,16,.5);border:1px solid rgba(212,175,55,.3);color:var(--gold);font-family:var(--font-t);font-size:.75rem;letter-spacing:.15em;transition:all .5s var(--ease);position:relative;overflow:hidden;cursor:pointer}
.btn::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at 50% 50%,rgba(212,175,55,.08),transparent 70%);opacity:0;transition:opacity .5s}
.btn:hover{border-color:rgba(212,175,55,.6);color:var(--gold-b);box-shadow:0 0 40px rgba(212,175,55,.1),inset 0 0 20px rgba(212,175,55,.03)}
.btn:hover::before{opacity:1}
.btn:active{transform:scale(.97)}
.btn2{border-color:rgba(212,175,55,.15);color:var(--td);font-size:.68rem}
.btn-sm{padding:7px 16px;font-size:.65rem}

/* Nav */
.nav{position:fixed;bottom:0;left:0;right:0;z-index:50;display:flex;align-items:center;justify-content:center;padding:10px 12px;background:linear-gradient(to top,rgba(6,3,16,.8),transparent)}
.nav-l{display:flex;gap:12px;overflow-x:auto;-webkit-overflow-scrolling:touch}
.nl{font-family:var(--font-t);font-size:.48rem;color:var(--tgh);letter-spacing:.12em;text-transform:uppercase;transition:all .4s;position:relative;padding-bottom:5px;white-space:nowrap;cursor:pointer}
.nl:hover,.nl.on{color:var(--gold);text-shadow:0 0 12px rgba(212,175,55,.2)}
.nl.on::after{content:'';position:absolute;bottom:0;left:20%;right:20%;height:1px;background:linear-gradient(90deg,transparent,var(--gold),transparent)}

/* Panel (glassmorphism) */
.panel{position:fixed;z-index:20;transition:all 1.2s var(--ease);opacity:0;transform:scale(.95);pointer-events:none}
.panel.show{opacity:1;transform:scale(1);pointer-events:auto}
.panel-inner{
  width:100%;height:100%;padding:28px 20px;overflow-y:auto;
  background:radial-gradient(ellipse at 50% 0%,rgba(26,8,40,.85),rgba(6,3,16,.92));
  border:1px solid rgba(212,175,55,.08);
  border-radius:12px;
    box-shadow:0 0 60px rgba(6,3,16,.5),inset 0 0 30px rgba(212,175,55,.02);
  scrollbar-width:thin;scrollbar-color:var(--gold-d) transparent;
}
.panel-inner::-webkit-scrollbar{width:3px}
.panel-inner::-webkit-scrollbar-thumb{background:var(--gold-d);border-radius:2px}

/* Menu */
.menu-title{font-family:var(--font-t);font-size:1rem;color:var(--gold);text-align:center;margin-bottom:4px;letter-spacing:.15em;text-shadow:0 0 20px rgba(212,175,55,.12)}
.menu-sub{font-size:.68rem;color:var(--td);text-align:center;font-style:italic;margin-bottom:18px;line-height:1.8}
.menu-div{text-align:center;font-size:.35rem;color:var(--gold-d);letter-spacing:1.2em;margin:14px 0;opacity:.3}
.mi{display:flex;align-items:center;gap:12px;padding:13px 10px;border-bottom:1px solid rgba(212,175,55,.04);cursor:pointer;transition:all .4s;border-radius:6px}
.mi:hover{background:rgba(212,175,55,.03)}
.mi:last-child{border-bottom:none}
.mi-s{font-size:1.1rem;width:32px;text-align:center;color:var(--gold-d);flex-shrink:0;text-shadow:0 0 10px rgba(212,175,55,.15)}
.mi-t{flex:1}
.mi-n{font-family:var(--font-t);font-size:.72rem;color:var(--gold);letter-spacing:.1em;margin-bottom:2px}
.mi-d{font-size:.58rem;color:var(--td);font-style:italic}
.mi-a{font-size:.55rem;color:var(--tgh)}

/* Section headers */
.sh{font-family:var(--font-t);font-size:.88rem;color:var(--gold);text-align:center;margin-bottom:4px;letter-spacing:.12em;text-shadow:0 0 15px rgba(212,175,55,.1)}
.sh::after{content:'✦';display:block;margin-top:6px;font-size:.35rem;color:var(--gold-d);letter-spacing:.6em;opacity:.3}
.ss{font-size:.68rem;color:var(--td);text-align:center;font-style:italic;margin-bottom:18px;line-height:1.9}
.back{display:inline-flex;align-items:center;gap:5px;font-family:var(--font-t);font-size:.58rem;color:var(--tgh);letter-spacing:.1em;text-transform:uppercase;cursor:pointer;margin-bottom:14px;transition:color .3s}
.back:hover{color:var(--gold)}

/* Form */
.fg{margin-bottom:12px}
.fg label{display:block;font-family:var(--font-t);font-size:.6rem;color:var(--tgh);letter-spacing:.12em;margin-bottom:4px}
.fg input,.fg select,.fg textarea{width:100%;font-family:var(--font-b);font-size:.78rem;color:var(--bone);background:rgba(6,3,16,.4);border:1px solid rgba(212,175,55,.08);padding:9px 11px;border-radius:4px;outline:none;transition:border-color .4s}
.fg input:focus,.fg select:focus,.fg textarea:focus{border-color:rgba(212,175,55,.3)}
.fg textarea{resize:vertical;min-height:65px}

/* Tarot */
.st{display:flex;gap:8px;justify-content:center;margin-bottom:14px}
.so{padding:5px 12px;border:1px solid rgba(212,175,55,.08);border-radius:4px;background:transparent;color:var(--tgh);font-family:var(--font-t);font-size:.6rem;letter-spacing:.1em;cursor:pointer;transition:all .3s}
.so:hover,.so.on{border-color:rgba(212,175,55,.3);color:var(--gold);background:rgba(212,175,55,.03)}
.ccd{display:flex;gap:32px;justify-content:center;align-items:flex-end;margin:18px 0}
.cc{display:flex;flex-direction:column;align-items:center;opacity:.1;transition:opacity 1s var(--ease)}
.cc.lit{opacity:1}
.cc-f{width:7px;height:13px;background:radial-gradient(ellipse at 50% 100%,var(--supernova),rgba(255,140,66,.3) 65%,transparent);border-radius:50% 50% 50% 50%/65% 65% 35% 35%;opacity:0;transition:opacity .6s;animation:fl 2.5s ease-in-out infinite alternate}
.cc.lit .cc-f{opacity:1}
.cc-b{width:9px;height:30px;background:linear-gradient(to bottom,#c8b898,#a89878);border-radius:2px;margin-top:-1px}
@keyframes fl{0%{opacity:.8}50%{opacity:1}100%{opacity:.85}}

.cr{display:flex;gap:8px;justify-content:center;flex-wrap:wrap;margin:14px 0}
.crd{width:58px;height:86px;position:relative;cursor:pointer;transform-style:preserve-3d;transition:transform .9s var(--ease)}
.crd:hover{transform:translateY(-8px) rotateX(4deg)}
.crd.flipped{transform:rotateY(180deg)}
.crd-f{position:absolute;inset:0;backface-visibility:visible;border:1px solid rgba(212,175,55,.2);border-radius:4px;display:grid;place-items:center;background:radial-gradient(ellipse at 50% 30%,rgba(26,8,40,.9),rgba(6,3,16,.95));color:var(--gold-d);font-size:.8rem;box-shadow:0 2px 8px rgba(0,0,0,.4)}
.crd-f::before{content:'';position:absolute;inset:2px;border:1px solid rgba(212,175,55,.06);border-radius:2px}
.crd.flipped .crd-f{opacity:0}
.crd-b{position:absolute;inset:0;backface-visibility:hidden;transform:rotateY(180deg);border:1px solid rgba(212,175,55,.3);border-radius:4px;background:radial-gradient(ellipse at 50% 30%,rgba(212,175,55,.05),transparent 60%),rgba(6,3,16,.95);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;padding:4px;font-size:.38rem;color:var(--tg);box-shadow:0 0 20px rgba(212,175,55,.06)}
.crd-b .rev{color:var(--blood);font-size:.32rem;transform:rotate(180deg)}

.res{display:flex;flex-direction:column;gap:18px;align-items:center}
.rc2{text-align:center}
.rc2 .sym{font-size:1.6rem;color:var(--gold);text-shadow:0 0 20px rgba(212,175,55,.2)}
.rc2 .name{font-family:var(--font-t);font-size:.64rem;color:var(--gold);letter-spacing:.1em;margin-top:3px}
.rc2 .orient{font-size:.42rem;color:var(--blood);margin-top:2px}
.rt{max-width:320px;text-align:center;margin:0 auto}
.rt p{font-size:.82rem;color:var(--gold);line-height:2.1;margin-bottom:8px;text-shadow:0 0 10px rgba(212,175,55,.05)}
.rl{font-size:.48rem;color:var(--tgh);text-align:center;line-height:1.7;margin:10px 0}
.ink{display:inline;opacity:0;filter:blur(3px);animation:ib .55s var(--ease) forwards}
@keyframes ib{0%{opacity:0;filter:blur(3px)}50%{opacity:.5;filter:blur(1.5px)}100%{opacity:1;filter:blur(0)}}

/* Star Chart */
.pl{margin-bottom:12px;padding:12px;border:1px solid rgba(212,175,55,.05);border-radius:6px;background:rgba(6,3,16,.3)}
.pl-n{font-family:var(--font-t);font-size:.58rem;color:var(--gold-d);letter-spacing:.12em;text-transform:uppercase;margin-bottom:3px}
.pl-s{font-size:.85rem;color:var(--gold);margin-bottom:3px}
.pl-d{font-size:.68rem;color:var(--td);line-height:1.7}

/* Name */
.et{display:inline-block;padding:5px 12px;margin:2px;border:1px solid rgba(212,175,55,.08);border-radius:3px;font-size:.72rem;color:var(--gold)}
.ed{font-size:.72rem;color:var(--td);line-height:1.9;margin-top:12px;text-align:center}

/* I Ching */
.hd{font-size:2.2rem;text-align:center;margin:14px 0;color:var(--gold);letter-spacing:5px;text-shadow:0 0 20px rgba(212,175,55,.15)}
.hn{font-family:var(--font-t);font-size:.92rem;color:var(--gold);text-align:center;margin-bottom:6px}
.hj{font-size:.78rem;color:var(--td);line-height:2;text-align:center;max-width:320px;margin:0 auto}
.cn-r{display:flex;gap:12px;justify-content:center;margin:12px 0}
.cn{width:38px;height:38px;border:1.5px solid rgba(212,175,55,.2);border-radius:50%;display:grid;place-items:center;font-size:.82rem;color:var(--gold);background:rgba(6,3,16,.4);transition:all .4s}
.cn.thrown{animation:cf .6s var(--ease)}
@keyframes cf{0%{transform:rotateX(0)}50%{transform:rotateX(90deg)}100%{transform:rotateX(0)}}

/* Dream */
.de{padding:12px;border:1px solid rgba(212,175,55,.04);border-radius:5px;background:rgba(6,3,16,.2);margin-bottom:8px}
.de-d{font-size:.5rem;color:var(--tgh);margin-bottom:2px}
.de-t{font-size:.72rem;color:var(--bone);line-height:1.8;margin-bottom:5px}
.de-s{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:5px}
.de-tag{padding:2px 7px;border:1px solid rgba(212,175,55,.08);border-radius:8px;font-size:.5rem;color:var(--gold)}
.de-i{font-size:.65rem;color:var(--td);line-height:1.7;font-style:italic}

/* Encyclopedia */
.eg{display:grid;grid-template-columns:repeat(auto-fill,minmax(100px,1fr));gap:7px}
.ei{padding:10px 6px;border:1px solid rgba(212,175,55,.04);border-radius:5px;background:rgba(6,3,16,.2);text-align:center;cursor:pointer;transition:all .4s}
.ei:hover{border-color:rgba(212,175,55,.12);background:rgba(212,175,55,.02);box-shadow:0 0 15px rgba(212,175,55,.03)}
.ei-s{font-size:1.2rem;margin-bottom:2px;text-shadow:0 0 8px rgba(212,175,55,.1)}
.ei-n{font-family:var(--font-t);font-size:.52rem;color:var(--gold);letter-spacing:.06em}
.ed2{margin-top:14px;padding:14px;border:1px solid rgba(212,175,55,.06);border-radius:5px;background:rgba(6,3,16,.3)}
.ed2 h3{font-family:var(--font-t);font-size:.8rem;color:var(--gold);font-weight:500;margin-bottom:8px;letter-spacing:.08em}
.ed2 p{font-size:.68rem;color:var(--td);line-height:1.9}

/* Records */
.rec{padding:11px;border:1px solid rgba(212,175,55,.04);border-radius:5px;background:rgba(6,3,16,.15);margin-bottom:7px;cursor:pointer;transition:all .3s}
.rec:hover{border-color:rgba(212,175,55,.1)}
.rec-h{display:flex;justify-content:space-between;align-items:center;margin-bottom:2px}
.rec-t{font-family:var(--font-t);font-size:.52rem;color:var(--gold-d);letter-spacing:.1em;text-transform:uppercase}
.rec-d{font-size:.42rem;color:var(--tgh)}
.rec-n{font-size:.75rem;color:var(--gold);margin-bottom:2px}
.rec-p{font-size:.62rem;color:var(--td);line-height:1.6;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.rec-x{margin-top:4px;font-size:.42rem;color:var(--tgh);background:none;border:none;font-family:inherit;text-decoration:underline;text-underline-offset:2px;cursor:pointer}
.re-e{text-align:center;padding:28px 10px}
.re-e p{font-size:.7rem;color:var(--td);line-height:2.2;font-style:italic}

/* Settings */
.set{position:fixed;inset:0;z-index:200}
.set-o{position:absolute;inset:0;background:rgba(6,3,16,.6)}
.set-d{position:absolute;bottom:0;left:0;right:0;background:rgba(15,8,30,.92);border-top:1px solid rgba(212,175,55,.08);border-radius:12px 12px 0 0;padding:18px;transform:translateY(100%);transition:transform .5s var(--ease)}
.set.vis .set-d{transform:translateY(0)}
.set-h{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px}
.set-h h3{font-family:var(--font-t);font-size:.68rem;color:var(--gold);font-weight:500;letter-spacing:.12em}
.set-x{background:none;border:none;color:var(--td);font-size:.95rem;cursor:pointer}
.set-i{display:flex;justify-content:space-between;align-items:center;padding:9px 0;border-bottom:1px solid rgba(212,175,55,.03)}
.set-i label{font-size:.7rem;color:var(--bone)}
.set-l{margin-top:12px;padding-top:10px;border-top:1px solid rgba(212,175,55,.03)}
.set-l p{font-size:.5rem;color:var(--tgh);line-height:1.7;margin-bottom:7px}
.set-b{background:none;border:none;color:var(--gold-d);font-size:.6rem;font-family:inherit;text-decoration:underline;text-underline-offset:3px;cursor:pointer}

/* Cosmic breathing animation */
@keyframes breathe{0%,100%{opacity:.85}50%{opacity:1}}

@media(max-width:480px){
  .panel-inner{padding:20px 14px}
  .mi{padding:11px 8px;gap:10px}
  .mi-s{font-size:.9rem;width:26px}
  .crd{width:48px;height:72px}
  .ccd{gap:22px}
  .eg{grid-template-columns:repeat(auto-fill,minmax(85px,1fr))}
  .nav-l{gap:8px}
  .nl{font-size:.42rem}
}
</style>
</head>
<body>

<div class="loading" id="loading"><div class="loading-text">✦ 帷幕正在升起 ✦</div></div>

<div class="age" id="age"><div class="age-box"><h2>你已年满18岁吗？</h2><p>你还年轻，星辰为你保留了最多的可能性。<br>这些解读可以参考，但不要让它替你做决定。</p><div class="age-btns"><button class="btn" id="ayes">我已成年</button><button class="btn btn2" id="ano">我还未成年</button></div></div></div>

<div class="splash" id="splash"><div class="si"><div class="rune"><svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg"><defs><filter id="gw"><feGaussianBlur stdDeviation="2" result="b"/><feComposite in="SourceGraphic" in2="b" operator="over"/></filter><linearGradient id="rg" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#d4af37" stop-opacity="0"/><stop offset="50%" stop-color="#ff8c42" stop-opacity="1"/><stop offset="100%" stop-color="#d4af37" stop-opacity="0"/></linearGradient></defs><circle cx="100" cy="100" r="80" fill="none" stroke="url(#rg)" stroke-width=".4" class="rc"/><circle cx="100" cy="100" r="60" fill="none" stroke="url(#rg)" stroke-width=".4" class="rc rc2"/><circle cx="100" cy="100" r="40" fill="none" stroke="url(#rg)" stroke-width=".4" class="rc rc3"/><polygon points="100,20 140,80 180,140 100,180 20,140 60,80" fill="none" stroke="url(#rg)" stroke-width=".6" class="rh" filter="url(#gw)"/><text x="100" y="108" text-anchor="middle" class="rsym" fill="#d4af37" font-size="24" opacity="0">☿</text></svg></div><div><p class="sl">你找到了这扇门。</p><p class="sl">这不是巧合。</p><p class="sl">在你出生的那一刻，</p><p class="sl">星辰就已经写好了这个时刻。</p></div><button class="btn" id="enter" style="opacity:0;transform:translateY(14px);transition:opacity 1s var(--ease),transform 1s var(--ease)">我准备好了</button></div></div>

<div class="doors" id="doors"><div class="door door-l" id="dl"><span class="door-s">☽</span></div><div class="door door-r" id="dr"><span class="door-s">☾</span></div></div>

<div class="panel" id="panel"><div class="panel-inner" id="panel-inner"></div></div>

<nav class="nav" id="nav" style="display:none"><div class="nav-l">
<a class="nl on" data-p="menu">密室</a><a class="nl" data-p="tarot">塔罗</a><a class="nl" data-p="star">星盘</a><a class="nl" data-p="name">姓名</a><a class="nl" data-p="iching">易经</a><a class="nl" data-p="daily">启示</a><a class="nl" data-p="dream">梦境</a><a class="nl" data-p="ency">图鉴</a><a class="nl" data-p="records">壁龛</a>
